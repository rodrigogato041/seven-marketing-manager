services:
  - type: web
    name: seven-marketing-manager
    runtime: docker
    plan: starter
    autoDeploy: true
    disk:
      name: seven-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: VITE_APP_ID
        value: seven-marketing-manager
      - key: DATA_DIR
        value: /data/app-data
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: LOCAL_AUTH_BYPASS
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: high
